<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SmartMeter Anomaly Detector</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script defer src="script.js"></script>
  <style>
    :root {
      --bg: #0b1220;
      --card: rgba(255, 255, 255, 0.06);
      --cardBorder: rgba(255, 255, 255, 0.14);
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.70);
      --accent: #6d5efc;
      --accent2: #22c55e;
      --shadow: 0 18px 60px rgba(0,0,0,0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Liberation Sans", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 500px at 20% 0%, rgba(109, 94, 252, 0.35), transparent 60%),
        radial-gradient(900px 500px at 80% 10%, rgba(34, 197, 94, 0.20), transparent 55%),
        var(--bg);
      padding: 28px;
    }

    .app {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--cardBorder);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 16px;
    }

    #upload-form {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 12px;
      margin-top: 10px;
    }

    label { color: var(--muted); font-size: 14px; }

    input[type="file"] {
      display: inline-block;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(0,0,0,0.18);
      color: var(--text);
      max-width: min(520px, 100%);
    }

    button {
      border: 0;
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.05s ease, filter 0.15s ease;
    }

    button:hover { filter: brightness(1.05); }
    button:active { transform: translateY(1px); }

    /* Make the chart much wider and responsive */
    #chart-container { width: 100%; margin-top: 14px; }
    #chart { width: 100% !important; height: 560px !important; }

    #anomaly-section { margin-top: 16px; }
    #anomaly-section h3 { margin: 0 0 10px; font-size: 16px; color: rgba(255,255,255,0.88); }

    #anomaly-table { width: 100%; border-collapse: collapse; overflow: hidden; border-radius: 12px; }
    #anomaly-table th, #anomaly-table td { border-bottom: 1px solid rgba(255,255,255,0.10); padding: 10px 12px; }
    #anomaly-table th { text-align: left; color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.06); }
    #anomaly-table tr:hover td { background: rgba(255,255,255,0.04); }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div>
        <h1>SmartMeter Anomaly Detector</h1>
        <div class="subtitle">Upload a CSV with <code>timestamp</code> and <code>consumption</code> to flag anomalies.</div>
      </div>
    </div>

    <div class="card">
      <form id="upload-form">
        <label>Upload CSV: <input type="file" id="csvfile" accept=".csv" /></label>
        <button type="submit">Detect Anomalies</button>
      </form>

      <div id="chart-container">
        <canvas id="chart"></canvas>
      </div>

      <div id="anomaly-section">
        <h3>Anomalies</h3>
        <table id="anomaly-table"></table>
      </div>
    </div>
  </div>
</body>
</html>
